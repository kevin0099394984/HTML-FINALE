/* ---------- Utilidades de color ---------- */
function hexToRgb(h){
  h = h.replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const num = parseInt(h,16);
  return [(num>>16)&255, (num>>8)&255, num&255];
}
function rgbToHex(rgb){
  return '#' + rgb.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function lerpHex(a,b,t){
  const ra = hexToRgb(a), rb = hexToRgb(b);
  return rgbToHex(ra.map((v,i)=> v + (rb[i]-v)*t));
}

/* ---------- Sprites pixel art ---------- */
const MOON_SPRITE = [
  "..XXXX..",".XXXXXX.","XXXXXXXX","XXXXXXXX",
  ".oXXXXX.","..oXXXX.","..XXXXXX","...XXXXX",
];
const MOON_COLORS = {X:"#eeeebb", o:"#aaaaaa", ".":null};

const SUN_SPRITE = [
  "....XX....",".R..XX..R.","R.XXXXXX.R",".XXXXXXXX.",
  "XXXXXXXXXX","XXXXXXXXXX",".XXXXXXXX.","R.XXXXXX.R",
  ".R..XX..R.","....XX....",
];
const SUN_COLORS = {X:"#ffee44", R:"#ff9900", ".":null};

const TREE_SPRITE = [
  "...XX...","..XXXX..",".XXXXXX.","XXXXXXXX",".XXXXXX.","..XXXX...",
  "...XX...","..XXXX..","XXXXXXXX",".XXXXXX.","...TT...","...TT...","...TT...","...TT...",
];
const TREE_COLORS_NIGHT = {X:"#112211", T:"#221100", ".":null};
const TREE_COLORS_DAY   = {X:"#33aa33", T:"#663300", ".":null};

/* ---------- Estrellas ---------- */
function makeStars(n=150,w=960,h=380){
  // PRNG simple con semilla fija (igual estilo que random.seed(42))
  let seed = 42;
  function rnd(){
    seed = (seed*9301+49297) % 233280;
    return seed/233280;
  }
  const stars=[];
  for(let i=0;i<n;i++){
    const x = Math.floor(rnd()*w);
    const y = Math.floor(rnd()*h);
    const sizeOptions=[1,1,1,2];
    const size = sizeOptions[Math.floor(rnd()*sizeOptions.length)];
    const bright = 0.3 + rnd()*0.7;
    stars.push({x,y,size,bright});
  }
  return stars;
}
const STARS = makeStars();

/* ════════════════════════════════════════════════════════════════
   CLASE PRINCIPAL
   ════════════════════════════════════════════════════════════════ */
class LuzApp{
  constructor(nombre){
    this.nombre = nombre || "";
    this.W = 960; this.H = 580; this.SKY_H = 340;
    this.TYPING_SPD = 32; this.LINE_PAUSE = 650;
    this.FADE_STEPS = 60; this.FADE_MS = 16;
    this.TWINKLE_MS = 80;

    this.stage = 0;
    this.memory = {};
    this.stageFrac = 0.0;
    this.twinkleState = STARS.map(()=>Math.random());
    this.auroraPhase = 0.0;

    this.landscapeMode = false;
    this.fireParticles = [];
    this.animFrame = 0;
    this.shootingStars = [];
    this.nextShooting = 60+Math.floor(Math.random()*120);
    this.brightStarIdx = -1;
    this.brightStarT = 0.0;
    this.nextBright = 100+Math.floor(Math.random()*150);

    this.personInRightChair = false;
    this.personWalkX = null;
    this.personWalking = false;

    this.landscapeLines = LANDSCAPE_LINES;
    this.landscapeShown = 0;
    this.landscapeChars = 0;
    this.landscapeTyping = false;
    this.landscapeDone = false;

    this.continueCb = null;
    this.typeTimer = null;

    this.canvas = document.getElementById('bgCanvas');
    this.ctx = this.canvas.getContext('2d');

    this.panel = document.getElementById('panel');
    this.panelText = document.getElementById('panelText');
    this.optsFrame = document.getElementById('optsFrame');
    this.contBtn = document.getElementById('contBtn');
    this.acceptBtn = document.getElementById('acceptBtn');

    this.contBtn.addEventListener('click', ()=>this.onContinue());
    this.acceptBtn.addEventListener('click', ()=>this.onAcceptLandscape());

    this.panel.style.display = 'flex';

    this.drawScene();
    this.startTwinkle();
    setTimeout(()=>this.startIntro(), 700);
  }

  /* ===== bucle de animacion / twinkle ===== */
  startTwinkle(){
    const tick = ()=>{
      for(let i=0;i<this.twinkleState.length;i++){
        this.twinkleState[i] += 0.02+Math.random()*0.05;
        if(this.twinkleState[i]>1.0) this.twinkleState[i]-=1.0;
      }
      this.animFrame++;
      this.drawScene();
      this.twinkleTimer = setTimeout(tick, this.TWINKLE_MS);
    };
    this.twinkleTimer = setTimeout(tick, this.TWINKLE_MS);
  }

  /* ===== interpolacion de etapa ===== */
  interpStage(){
    const idx = Math.min(this.stage, SKY_STAGES.length-1);
    const idx2 = Math.min(idx+1, SKY_STAGES.length-1);
    const t = this.stageFrac;
    const a = SKY_STAGES[idx], b = SKY_STAGES[idx2];
    const out = {};
    for(const k in a){
      const va=a[k], vb=b[k];
      if(typeof va === 'number'){ out[k] = va + (vb-va)*t; }
      else if(typeof va === 'string' && va[0]==='#'){ out[k] = lerpHex(va,vb,t); }
      else out[k]=va;
    }
    return out;
  }

  advanceStage(cb){
    this.stage = Math.min(this.stage+1, SKY_STAGES.length-1);
    this.stageFrac = 0.0;
    const pal = SKY_STAGES[this.stage];
    const steps = this.FADE_STEPS;
    const tick = (i)=>{
      this.stageFrac = i/steps;
      this.updateUiColors(pal);
      if(i<steps){ setTimeout(()=>tick(i+1), this.FADE_MS); }
      else { this.stageFrac = 0.0; if(cb) cb(); }
    };
    tick(0);
  }

  updateUiColors(pal){
    this.panel.style.borderColor = lerpHex('#2a2a66', pal.btn_fg, 0.3);
    this.panelText.style.color = pal.fg;
    this.contBtn.style.background = lerpHex('#14144a', pal.btn_bg, 0.5);
    this.contBtn.style.color = pal.btn_fg;
    for(const child of this.optsFrame.children){
      child.style.background = pal.btn_bg;
      child.style.color = pal.btn_fg;
    }
  }

  /* ===== dibujo principal ===== */
  drawScene(){
    const ctx = this.ctx;
    ctx.clearRect(0,0,this.W,this.H);
    if(this.landscapeMode){ this.drawCampfireNight(); }
    else { this.drawNormalScene(); }
  }

  drawNormalScene(){
    const ctx=this.ctx;
    const s = this.interpStage();
    const W=this.W, H=this.H, SKY_H=this.SKY_H;

    const bands=40;
    for(let i=0;i<bands;i++){
      const t=i/bands;
      const c1=lerpHex(s.sky_top,s.sky_bot,t);
      const y0=Math.floor(SKY_H*i/bands), y1=Math.floor(SKY_H*(i+1)/bands);
      ctx.fillStyle=c1; ctx.fillRect(0,y0,W,y1-y0+1);
    }
    const horBands=20;
    for(let i=0;i<horBands;i++){
      const t=i/horBands;
      const c1=lerpHex(s.hor_top,s.hor_bot,t);
      const y0=SKY_H+Math.floor(30*i/horBands), y1=SKY_H+Math.floor(30*(i+1)/horBands);
      ctx.fillStyle=c1; ctx.fillRect(0,y0,W,y1-y0+1);
    }

    this.drawGround(s);

    if(s.stars>0.01) this.drawStars(s.stars);
    if(s.moon>0.05){
      this.drawSprite(MOON_SPRITE, MOON_COLORS, 80,40,5, s.moon, lerpHex(s.sky_top,s.sky_bot,0.15));
    }
    if(s.sun>0.05) this.drawSun(s);
    if(s.clouds>0.05) this.drawClouds(s);
    this.drawTrees(s);

    if(s.sun>0.1){
      for(let r=8;r>0;r--){
        ctx.fillStyle=s.glow;
        ctx.globalAlpha = 0.10;
        ctx.beginPath();
        ctx.ellipse(W/2, SKY_H, r*18, r*6, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    if(this.stage>=6) this.drawAurora();
  }

  drawGround(s){
    const ctx=this.ctx, W=this.W,H=this.H,SKY_H=this.SKY_H;
    ctx.fillStyle=s.ground; ctx.fillRect(0,SKY_H+28,W,H-(SKY_H+28));
    ctx.fillStyle=s.ground2; ctx.fillRect(0,SKY_H+50,W,H-(SKY_H+50));
    const grassC = lerpHex(s.ground, s.hor_bot, 0.3);
    const px=6;
    let seed=7;
    const rnd=()=>{ seed=(seed*9301+49297)%233280; return seed/233280; };
    for(let gx=0; gx<W; gx+=px*2){
      const hGrass = 3+Math.floor(rnd()*6);
      ctx.fillStyle=grassC;
      ctx.fillRect(gx, SKY_H+28-hGrass, px, hGrass);
    }
  }

  drawStars(alpha){
    const ctx=this.ctx;
    for(let i=0;i<STARS.length;i++){
      const st=STARS[i];
      if(st.y > this.SKY_H) continue;
      let intensity, sizeBoost;
      if(i===this.brightStarIdx && this.brightStarT>0){
        const pulse = Math.sin(this.brightStarT*Math.PI);
        intensity = Math.floor(255*Math.min(1.0, alpha*st.bright + pulse*0.7));
        sizeBoost = st.size + Math.floor(pulse*3);
      } else {
        const twinkle = 0.6+0.4*Math.sin(this.twinkleState[i]*Math.PI*2);
        intensity = Math.floor(255*alpha*st.bright*twinkle);
        sizeBoost = st.size;
      }
      intensity = Math.max(0,Math.min(255,intensity));
      const col = `rgb(${intensity},${intensity},${Math.min(255,intensity+30)})`;
      ctx.fillStyle=col;
      ctx.fillRect(st.x, st.y, sizeBoost, sizeBoost);
      if(i===this.brightStarIdx && this.brightStarT>0){
        const pulse = Math.sin(this.brightStarT*Math.PI);
        if(pulse>0.3){
          const haloR = Math.floor(pulse*14);
          ctx.strokeStyle="#ffffcc"; ctx.lineWidth=1;
          ctx.beginPath();
          ctx.ellipse(st.x+sizeBoost/2, st.y+sizeBoost/2, sizeBoost/2+haloR, sizeBoost/2+haloR,0,0,Math.PI*2);
          ctx.stroke();
        }
      }
    }
  }

  drawSun(s){
    const sunY = Math.floor(this.SKY_H*(1.0-s.sun)*0.85);
    this.drawSprite(SUN_SPRITE, SUN_COLORS, this.W/2-20, sunY, 4, Math.min(1.0,s.sun*1.5),
      lerpHex(s.sky_top,s.sky_bot, sunY/this.SKY_H));
  }

  drawClouds(s){
    const ctx=this.ctx;
    const cloudCol = lerpHex("#ffffff", s.hor_bot, 0.3);
    const positions=[[120,60],[400,90],[650,50],[820,110]];
    for(const [cx,cy] of positions){
      if(s.clouds<0.3 && cx>400) continue;
      const parts=[[0,8,40,16],[10,0,60,20],[30,6,50,18]];
      for(const [dx,dy,cw,ch] of parts){
        ctx.fillStyle=cloudCol;
        ctx.fillRect(cx+dx, cy+dy, cw, ch);
      }
    }
  }

  drawTrees(s){
    const stageT = Math.min(1.0, this.stage/6.0);
    const tCol = {
      X: lerpHex(TREE_COLORS_NIGHT.X, TREE_COLORS_DAY.X, stageT),
      T: lerpHex(TREE_COLORS_NIGHT.T, TREE_COLORS_DAY.T, stageT),
      ".": null,
    };
    const trees=[[30,this.SKY_H-55,6],[860,this.SKY_H-55,6],[150,this.SKY_H-48,5],[780,this.SKY_H-48,5]];
    for(const [tx,ty,sc] of trees){
      this.drawSprite(TREE_SPRITE, tCol, tx, ty, sc);
    }
  }

  drawSprite(sprite, colors, x, y, px, alpha=1.0, bgColor=null){
    const ctx=this.ctx;
    for(let ri=0; ri<sprite.length; ri++){
      const row=sprite[ri];
      for(let ci=0; ci<row.length; ci++){
        const ch=row[ci];
        let col = colors[ch];
        if(col===undefined || col===null) continue;
        if(alpha<1.0 && bgColor) col = lerpHex(bgColor, col, alpha);
        ctx.fillStyle=col;
        ctx.fillRect(x+ci*px, y+ri*px, px, px);
      }
    }
  }

  drawAurora(){
    const ctx=this.ctx;
    this.auroraPhase += 0.03;
    const colors=["#ff6ec7","#a78bfa","#34d399","#60a5fa","#fbbf24"];
    for(let i=0;i<colors.length;i++){
      const phase = this.auroraPhase + i*0.4;
      const amp = 25+10*Math.sin(phase*0.7);
      const yBase = 40+i*22;
      ctx.beginPath();
      for(let ssn=0; ssn<=40; ssn++){
        const fx = ssn*(this.W/40);
        const fy = yBase + amp*Math.sin(phase+ssn*0.35);
        if(ssn===0) ctx.moveTo(fx,fy); else ctx.lineTo(fx,fy);
      }
      ctx.strokeStyle=colors[i];
      ctx.lineWidth=3;
      ctx.stroke();
    }
  }

  /* ===== escena de fogata nocturna ===== */
  drawCampfireNight(){
    const ctx=this.ctx, W=this.W,H=this.H;
    const frame=this.animFrame;

    const skyBands=50;
    for(let i=0;i<skyBands;i++){
      const t=i/skyBands;
      const c = lerpHex("#000005","#0a0825",t);
      const y0=Math.floor(H*0.72*i/skyBands), y1=Math.floor(H*0.72*(i+1)/skyBands);
      ctx.fillStyle=c; ctx.fillRect(0,y0,W,y1-y0+1);
    }

    this.drawMountains();

    const groundH = Math.floor(H*0.72);
    for(let i=0;i<6;i++){
      const t=i/6;
      const gc=lerpHex("#0d0d08","#181810",t);
      ctx.fillStyle=gc; ctx.fillRect(0, groundH+i*4, W, 5);
    }
    ctx.fillStyle="#0f0f0a"; ctx.fillRect(0, groundH+24, W, H-(groundH+24));

    const fireX = W/2, fireY = groundH-10;
    const glowPulse = 0.85+0.15*Math.sin(frame*0.18);
    for(let r=18;r>0;r--){
      const alphaR = (18-r)/18*glowPulse;
      const rc=Math.floor(alphaR*80), gcv=Math.floor(alphaR*35);
      ctx.fillStyle=`rgb(${rc},${gcv},0)`;
      ctx.beginPath();
      ctx.ellipse(fireX, fireY, r*14, r*8, 0, 0, Math.PI*2);
      ctx.fill();
    }

    this.drawNightStars(frame);
    this.drawSprite(MOON_SPRITE, MOON_COLORS, 820, 30, 5);
    this.updateShootingStars();
    this.drawShootingStars();
    this.drawPineSilhouettes(groundH);
    this.drawCampfireScene(fireX, fireY, groundH, frame);
    this.drawFire(fireX, fireY, frame);

    if(!this.personInRightChair || this.landscapeTyping){
      this.drawLandscapeMessage();
    }

    this.animFrame++;

    this.nextBright--;
    if(this.nextBright<=0){
      this.brightStarIdx = Math.floor(Math.random()*STARS.length);
      this.brightStarT = 1.0;
      this.nextBright = 120+Math.floor(Math.random()*180);
    }
    if(this.brightStarT>0) this.brightStarT = Math.max(0.0, this.brightStarT-0.018);
  }

  drawMountains(){
    const ctx=this.ctx, W=this.W,H=this.H;
    const groundH = Math.floor(H*0.72);

    ctx.beginPath();
    ctx.moveTo(0,groundH);
    for(let x=0;x<=W;x+=30){
      const y = groundH - Math.floor(60*(0.5+0.5*Math.sin(x*0.009+1.2)));
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,groundH);
    ctx.closePath();
    ctx.fillStyle="#0d0d1a"; ctx.fill();

    ctx.beginPath();
    ctx.moveTo(0,groundH);
    for(let x=0;x<=W;x+=20){
      const y = groundH - Math.floor(85*(0.4+0.6*Math.sin(x*0.013+0.4)));
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,groundH);
    ctx.closePath();
    ctx.fillStyle="#080810"; ctx.fill();
  }

  drawPineSilhouettes(groundH){
    const ctx=this.ctx;
    const pineColor="#060608";
    const pines=[[40,groundH,1.0],[90,groundH+4,0.8],[870,groundH,1.0],[820,groundH+4,0.85],[150,groundH+8,0.65],[760,groundH+8,0.65]];
    for(const [px,base,scale] of pines){
      ctx.beginPath();
      ctx.moveTo(px,base);
      ctx.lineTo(px-18*scale, base-28*scale);
      ctx.lineTo(px-10*scale, base-28*scale);
      ctx.lineTo(px-10*scale, base-48*scale);
      ctx.lineTo(px+10*scale, base-48*scale);
      ctx.lineTo(px+10*scale, base-28*scale);
      ctx.lineTo(px+18*scale, base-28*scale);
      ctx.closePath();
      ctx.fillStyle=pineColor; ctx.fill();
      ctx.fillStyle="#0a0804";
      ctx.fillRect(px-3*scale, base-8*scale, 6*scale, 8*scale);
    }
  }

  drawNightStars(frame){
    const ctx=this.ctx;
    for(let i=0;i<STARS.length;i++){
      const st=STARS[i];
      if(st.y > this.H*0.68) continue;
      if(i===this.brightStarIdx && this.brightStarT>0){
        const pulse = Math.sin(this.brightStarT*Math.PI);
        const intensity = Math.floor(200+55*pulse);
        const sz = st.size+Math.floor(pulse*4);
        const col=`rgb(${intensity},${intensity},${Math.min(255,intensity+20)})`;
        ctx.fillStyle=col; ctx.fillRect(st.x, st.y, sz, sz);
        if(pulse>0.4){
          const hr=Math.floor(pulse*20);
          ctx.strokeStyle="#ffffdd"; ctx.lineWidth=1;
          ctx.beginPath();
          ctx.ellipse(st.x+sz/2, st.y+sz/2, sz/2+hr, sz/2+hr,0,0,Math.PI*2);
          ctx.stroke();
          const cxS=st.x+sz/2, cyS=st.y+sz/2;
          const rayLen = Math.floor(pulse*12);
          for(const angle of [0,90,180,270]){
            const rad = angle*Math.PI/180;
            const ex = cxS+rayLen*Math.cos(rad), ey=cyS+rayLen*Math.sin(rad);
            ctx.strokeStyle="#ffffaa";
            ctx.beginPath(); ctx.moveTo(cxS,cyS); ctx.lineTo(ex,ey); ctx.stroke();
          }
        }
        continue;
      }
      const twinkle = 0.55+0.45*Math.sin(this.twinkleState[i]*Math.PI*2 + frame*0.04);
      let intensity = Math.floor(255*st.bright*twinkle);
      intensity = Math.max(30,Math.min(255,intensity));
      ctx.fillStyle=`rgb(${intensity},${intensity},${Math.min(255,intensity+25)})`;
      ctx.fillRect(st.x, st.y, st.size, st.size);
    }
  }

  updateShootingStars(){
    this.nextShooting--;
    if(this.nextShooting<=0){
      const sx = 100+Math.floor(Math.random()*(this.W-300));
      const sy = 20+Math.floor(Math.random()*(this.H*0.35-20));
      this.shootingStars.push({
        x:sx, y:sy,
        vx: 4+Math.random()*4,
        vy: 2+Math.random()*3,
        life:30, maxLife:30, tail:[],
      });
      this.nextShooting = 90+Math.floor(Math.random()*130);
    }
    const alive=[];
    for(const ss of this.shootingStars){
      ss.tail.push([ss.x,ss.y]);
      if(ss.tail.length>12) ss.tail.shift();
      ss.x += ss.vx; ss.y += ss.vy; ss.life--;
      if(ss.life>0 && ss.x<this.W && ss.y<this.H*0.7) alive.push(ss);
    }
    this.shootingStars = alive;
  }

  drawShootingStars(){
    const ctx=this.ctx;
    for(const ss of this.shootingStars){
      const alpha = ss.life/ss.maxLife;
      const tail = ss.tail;
      for(let j=0;j<tail.length;j++){
        const [tx,ty]=tail[j];
        const tAlpha = (j/tail.length)*alpha;
        const intensity = Math.floor(255*tAlpha);
        ctx.fillStyle=`rgb(${intensity},${intensity},${Math.min(255,intensity+30)})`;
        const sz = j>tail.length-4 ? 2:1;
        ctx.fillRect(tx,ty,sz,sz);
      }
    }
  }

  drawFire(fx,fy,frame){
    const ctx=this.ctx;
    const logCol="#3a1a05";
    ctx.fillStyle=logCol;
    ctx.fillRect(fx-28, fy, 56, 8);
    ctx.fillRect(fx-24, fy-4, 44, 8);

    const embers=[[-18,2],[-8,0],[4,1],[16,3],[-5,4],[10,4]];
    for(const [bxOff,byOff] of embers){
      const emberB = 0.6+0.4*Math.sin(frame*0.22+bxOff*0.5);
      const ecR = Math.floor(200+55*emberB), ecG=Math.floor(60+40*emberB);
      ctx.fillStyle=`rgb(${ecR},${ecG},0)`;
      ctx.fillRect(fx+bxOff, fy+byOff, 2, 2);
    }

    const layers=[[22,34,"#cc3300","#ff6600"],[14,26,"#ff6600","#ffbb00"],[7,18,"#ffcc00","#ffffff"]];
    for(let layer=0; layer<layers.length; layer++){
      const [flameW,flameH,colA,colB]=layers[layer];
      const steps=14;
      ctx.beginPath();
      ctx.moveTo(fx,fy);
      for(let si=0; si<=steps; si++){
        const t=si/steps;
        const wave = Math.sin(frame*0.28 + t*Math.PI*2 + layer*1.1);
        const pxF = fx + Math.floor(flameW*(t-0.5)*2) + Math.floor(wave*6);
        let pyF = fy - Math.floor(flameH*(0.5+0.5*Math.sin(t*Math.PI)));
        pyF += Math.floor(wave*4);
        ctx.lineTo(pxF,pyF);
      }
      ctx.lineTo(fx,fy);
      ctx.closePath();
      const mix = 0.5+0.5*Math.sin(frame*0.15+layer);
      ctx.fillStyle = lerpHex(colA,colB,mix);
      ctx.fill();
    }

    for(const p of this.fireParticles){
      const pxP=Math.floor(p.x), pyP=Math.floor(p.y);
      const alphaP = p.life/p.maxLife;
      if(alphaP>0){
        const ic=Math.floor(255*alphaP);
        ctx.fillStyle=`rgb(${ic},${Math.min(255,Math.floor(ic*0.6))},0)`;
        const szP = alphaP>0.5?2:1;
        ctx.fillRect(pxP,pyP,szP,szP);
      }
    }
    this.updateFireParticles(fx,fy,frame);
  }

  updateFireParticles(fx,fy,frame){
    if(frame%4===0){
      const n = 1+Math.floor(Math.random()*3);
      for(let i=0;i<n;i++){
        this.fireParticles.push({
          x: fx + (Math.random()*24-12),
          y: fy - (5+Math.random()*15),
          vx: (Math.random()*2.4-1.2),
          vy: -(0.8+Math.random()*1.7),
          life: 10+Math.floor(Math.random()*18),
          maxLife: 28,
        });
      }
    }
    const alive=[];
    for(const p of this.fireParticles){
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.06;
      p.vx += (Math.random()*0.2-0.1);
      p.life--;
      if(p.life>0) alive.push(p);
    }
    this.fireParticles = alive;
  }

  drawCampfireScene(fireX,fireY,groundH,frame){
    const glowPulse = 0.7+0.3*Math.sin(frame*0.18);

    const chairRX = fireX+95, chairRY = groundH-48;
    this.drawWoodenChair(chairRX, chairRY, glowPulse, true);

    const chairLX = fireX-110, chairLY = groundH-48;
    this.drawWoodenChair(chairLX, chairLY, glowPulse, false);
    this.drawSeatedPerson(chairLX, chairLY, glowPulse, frame);

    if(this.personInRightChair){
      this.drawSeatedPersonRight(chairRX, chairRY, glowPulse, frame);
    } else if(this.personWalking && this.personWalkX!==null){
      this.drawWalkingPerson(this.personWalkX, groundH-10, glowPulse, frame);
    } else {
      this.drawMug(chairRX-2, chairRY-20, glowPulse);
    }
  }

  drawWoodenChair(cx,cy,glow,flip){
    const ctx=this.ctx;
    const wDark = lerpHex("#1a0c02","#3d1e08", glow*0.8);
    const wMid  = lerpHex("#2a1205","#6b3510", glow*0.8);
    const wLight= lerpHex("#3a1a08","#8b4a18", glow*0.8);
    const d = flip ? -1 : 1;

    ctx.fillStyle=wMid; ctx.fillRect(cx-20*d, cy-8, 40*d, 8);
    ctx.fillStyle=wLight; ctx.fillRect(cx-20*d, cy-10, 40*d, 3);
    ctx.fillStyle=wDark; ctx.fillRect(cx-18*d, cy-44, 6*d, 36);
    for(const ry of [cy-42,cy-34,cy-26]){
      ctx.fillStyle=wLight; ctx.fillRect(cx-18*d, ry, 6*d, 3);
    }
    for(const lxOff of [18,6]){
      ctx.fillStyle=wDark; ctx.fillRect(cx+lxOff*d-2, cy, 4, 28);
    }
    for(const lxOff of [-18,-6]){
      ctx.fillStyle=wDark; ctx.fillRect(cx+lxOff*d-2, cy, 4, 28);
    }
    ctx.fillStyle=wMid; ctx.fillRect(cx-18*d, cy+18, 36*d, 3);
  }

  // Normaliza rects con ancho/alto posiblemente negativos (por flip)
  // ctx.fillRect soporta negativos en canvas, asi que no hace falta normalizar.

  drawSeatedPerson(cx,cy,glow,frame){
    const ctx=this.ctx;
    const fireWarmth = glow;
    const skin = lerpHex("#1a0a02","#c68642", fireWarmth*0.7);
    const hair = lerpHex("#050202","#2c1506", fireWarmth*0.5);
    const cloth= lerpHex("#050510","#2a2a4a", fireWarmth*0.4);
    const warm = lerpHex("#0a0502","#4a2010", fireWarmth*0.6);
    const px=3;
    const bx = cx-14;

    ctx.fillStyle=cloth;
    for(const legX of [bx+2, bx+10]){
      ctx.fillRect(legX, cy-2, 5*px, 10);
    }
    ctx.fillStyle=warm;
    ctx.fillRect(bx+1, cy+6, 7, 4);
    ctx.fillRect(bx+10, cy+6, 8, 4);
    ctx.fillStyle=cloth;
    ctx.fillRect(bx+4, cy-22, 20, 20);
    ctx.fillStyle=warm;
    ctx.fillRect(bx+1, cy-18, 5, 14);
    ctx.fillStyle=skin;
    ctx.fillRect(bx+2, cy-5, 8, 4);

    const mugWx = bx+3, mugWy = cy-12;
    ctx.fillStyle="#cc8844"; ctx.fillRect(mugWx, mugWy+4, 8, 6);
    ctx.fillStyle="#eeb866"; ctx.fillRect(mugWx, mugWy+2, 8, 3);
    const steamPts=[[1,0],[4,-1],[7,0]];
    for(let vi=0; vi<steamPts.length; vi++){
      const [vxOff,vyOff]=steamPts[vi];
      const vyAnim = vyOff - Math.floor(Math.abs(Math.sin(frame*0.12+vi*0.8))*4);
      ctx.fillStyle="#aaccdd";
      ctx.fillRect(mugWx+vxOff, mugWy+vyAnim, 1, 2);
    }
    ctx.fillStyle=warm;
    ctx.fillRect(bx+20, cy-18, 6, 14);
    ctx.fillStyle=skin;
    ctx.fillRect(bx+10, cy-26, 6, 4);
    ctx.fillRect(bx+6, cy-40, 16, 14);
    ctx.fillStyle=hair;
    ctx.fillRect(bx+5, cy-42, 18, 6);
    ctx.fillRect(bx+4, cy-40, 3, 12);
    ctx.fillStyle="#1a0a00";
    ctx.fillRect(bx+16, cy-36, 3, 3);
    ctx.fillStyle="#ffffff";
    ctx.fillRect(bx+17, cy-35, 1, 1);
  }

  drawSeatedPersonRight(cx,cy,glow,frame){
    const ctx=this.ctx;
    const fireWarmth = glow;
    const skin = lerpHex("#1a0a02","#c68642", fireWarmth*0.7);
    const hair = lerpHex("#050202","#2c1506", fireWarmth*0.5);
    const cloth= lerpHex("#050510","#2a2a4a", fireWarmth*0.4);
    const warm = lerpHex("#0a0502","#4a2010", fireWarmth*0.6);
    const bx = cx-10;

    ctx.fillStyle=cloth;
    for(const legX of [bx-12, bx-4]){
      ctx.fillRect(legX, cy-2, 5*3, 10);
    }
    ctx.fillStyle=warm;
    ctx.fillRect(bx-14, cy+6, 8, 4);
    ctx.fillRect(bx-4, cy+6, 8, 4);
    ctx.fillStyle=cloth;
    ctx.fillRect(bx-16, cy-22, 20, 20);
    ctx.fillStyle=warm;
    ctx.fillRect(bx-18, cy-18, 6, 14);
    ctx.fillRect(bx+2, cy-18, 6, 14);
    ctx.fillStyle=skin;
    ctx.fillRect(bx+2, cy-5, 8, 4);

    const mugWx = bx+3, mugWy = cy-12;
    ctx.fillStyle="#cc8844"; ctx.fillRect(mugWx, mugWy+4, 8, 6);
    ctx.fillStyle="#eeb866"; ctx.fillRect(mugWx, mugWy+2, 8, 3);
    const steamPts=[[1,0],[4,-1],[7,0]];
    for(let vi=0; vi<steamPts.length; vi++){
      const [vxOff,vyOff]=steamPts[vi];
      const vyAnim = vyOff - Math.floor(Math.abs(Math.sin(frame*0.12+vi*0.8+1.5))*4);
      ctx.fillStyle="#aaccdd";
      ctx.fillRect(mugWx+vxOff, mugWy+vyAnim, 1, 2);
    }
    ctx.fillStyle=skin;
    ctx.fillRect(bx-10, cy-26, 6, 4);
    ctx.fillRect(bx-20, cy-40, 16, 14);
    ctx.fillStyle=hair;
    ctx.fillRect(bx-21, cy-42, 18, 6);
    ctx.fillRect(bx-5, cy-40, 3, 12);
    ctx.fillStyle="#1a0a00";
    ctx.fillRect(bx-19, cy-36, 3, 3);
    ctx.fillStyle="#ffffff";
    ctx.fillRect(bx-18, cy-35, 1, 1);
  }

  drawWalkingPerson(wx,wy,glow,frame){
    const ctx=this.ctx;
    const fireWarmth = glow;
    const skin = lerpHex("#1a0a02","#c68642", fireWarmth*0.7);
    const hair = lerpHex("#050202","#2c1506", fireWarmth*0.5);
    const cloth= lerpHex("#050510","#2a2a4a", fireWarmth*0.4);
    const warm = lerpHex("#0a0502","#4a2010", fireWarmth*0.6);

    const legSwing = Math.floor(Math.sin(frame*0.4)*5);
    ctx.fillStyle=cloth;
    ctx.fillRect(wx-6, wy-8, 4, 8+legSwing);
    ctx.fillRect(wx+2, wy-8, 4, 8-legSwing);
    ctx.fillRect(wx-8, wy-24, 16, 16);

    const armSwing = Math.floor(Math.sin(frame*0.4)*4);
    ctx.fillStyle=warm;
    ctx.fillRect(wx-12, wy-22, 4, 12+armSwing);
    ctx.fillRect(wx+8, wy-22, 4, 12-armSwing);

    ctx.fillStyle=skin;
    ctx.fillRect(wx-3, wy-28, 6, 4);
    ctx.fillRect(wx-8, wy-42, 16, 14);

    ctx.fillStyle=hair;
    ctx.fillRect(wx-9, wy-44, 18, 6);
  }

  drawMug(mx,my,glow){
    const ctx=this.ctx;
    const mugC = lerpHex("#3a2010","#cc8844", glow*0.8);
    const rimC = lerpHex("#4a2a14","#eeb866", glow*0.8);
    ctx.fillStyle=mugC; ctx.fillRect(mx, my+8, 14, 10);
    ctx.fillStyle=rimC; ctx.fillRect(mx, my+5, 14, 4);
    ctx.fillStyle=mugC; ctx.fillRect(mx+12, my+9, 4, 6);
  }

  drawLandscapeMessage(){
    if(!this.landscapeTyping) return;
    const ctx=this.ctx, W=this.W;
    let linesToShow = this.landscapeLines.slice(0, this.landscapeShown);
    if(this.landscapeShown < this.landscapeLines.length){
      const partial = this.landscapeLines[this.landscapeShown];
      const partialShown = partial.slice(0, this.landscapeChars) + (partial ? "_" : "");
      if(partial) linesToShow = linesToShow.concat([partialShown]);
    }

    const txtYBase = Math.floor(this.H*0.73);
    ctx.fillStyle="#050508";
    ctx.fillRect(0, txtYBase, W, this.H-txtYBase);
    ctx.fillStyle="#2a2a4a";
    ctx.fillRect(40, txtYBase, W-80, 1);

    const lineH=17;
    let yTxt = txtYBase+10;
    ctx.font = "14px 'Courier New', monospace";
    ctx.textAlign="center";
    ctx.textBaseline="top";
    for(const line of linesToShow){
      if(line===""){ yTxt+=6; continue; }
      let col;
      if(line.includes("Feliz cumpleaños")) col="#ffd080";
      else if(line.includes("Dios")) col="#aaddff";
      else col="#c8c8dd";
      ctx.fillStyle=col;
      ctx.fillText(line, W/2, yTxt);
      yTxt += lineH;
    }
    ctx.textAlign="start";
    ctx.textBaseline="alphabetic";
  }

  tickLandscapeMessage(){
    if(!this.landscapeTyping) return;
    if(this.landscapeShown >= this.landscapeLines.length){
      this.landscapeDone = true;
      this.showAcceptButton();
      return;
    }
    const currentLine = this.landscapeLines[this.landscapeShown];
    if(currentLine===""){
      this.landscapeShown++;
      this.landscapeChars=0;
      setTimeout(()=>this.tickLandscapeMessage(), 300);
      return;
    }
    let delay;
    if(this.landscapeChars < currentLine.length){
      this.landscapeChars++;
      delay=38;
    } else {
      this.landscapeShown++;
      this.landscapeChars=0;
      delay=750;
    }
    if(this.landscapeShown < this.landscapeLines.length){
      setTimeout(()=>this.tickLandscapeMessage(), delay);
    } else {
      this.landscapeDone = true;
      setTimeout(()=>this.showAcceptButton(), 800);
    }
  }

  showAcceptButton(){
    this.acceptBtn.style.display='block';
  }

  onAcceptLandscape(){
    this.acceptBtn.style.display='none';
    this.landscapeTyping = false;
    const W=this.W;
    const fireX = W/2;
    const groundH = Math.floor(this.H*0.72);
    const startX = fireX+200;
    const targetX = fireX+95;
    this.personWalkX = startX;
    this.personWalkTarget = targetX;
    this.personWalkGround = groundH;
    this.personWalking = true;
    this.animateWalk();
  }

  animateWalk(){
    if(!this.personWalking) return;
    const target = this.personWalkTarget;
    const speed=4;
    this.personWalkX -= speed;
    if(this.personWalkX <= target){
      this.personWalkX = target;
      this.personWalking = false;
      this.personInRightChair = true;
    } else {
      setTimeout(()=>this.animateWalk(), 30);
    }
  }

  /* ===== maquina de escribir ===== */
  typewrite(lines, onDone){
    this.panelText.textContent = "";
    this.hideContinue();
    this.clearOptions();
    const completed=[];

    const write = (li=0, ci=0, current="")=>{
      if(li>=lines.length){
        this.panelText.textContent = current.replace(/_$/,'');
        if(onDone) setTimeout(onDone, 300);
        return;
      }
      const line = lines[li];
      if(ci<line.length){
        const displayed = current.replace(/_$/,'') + line[ci] + "_";
        this.panelText.textContent = displayed;
        this.typeTimer = setTimeout(()=>write(li, ci+1, displayed.replace(/_$/,'')), this.TYPING_SPD);
      } else {
        completed.push(line);
        const base = completed.join("\n");
        this.panelText.textContent = base + "_";
        this.typeTimer = setTimeout(()=>write(li+1, 0, base+"\n"), this.LINE_PAUSE);
      }
    };
    write();
  }

  /* ===== botones ===== */
  showContinue(cb){
    this.continueCb = cb;
    this.contBtn.style.display = 'inline-block';
  }
  hideContinue(){
    this.contBtn.style.display = 'none';
  }
  onContinue(){
    if(this.continueCb){
      const cb = this.continueCb;
      this.continueCb = null;
      this.hideContinue();
      cb();
    }
  }

  showOptions(options, onChoice){
    this.clearOptions();
    const pal = SKY_STAGES[Math.min(this.stage, SKY_STAGES.length-1)];
    for(const opt of options){
      const b = document.createElement('button');
      b.className='opt-btn';
      b.textContent = opt.label;
      b.style.background = pal.btn_bg;
      b.style.color = pal.btn_fg;
      b.addEventListener('click', ()=>onChoice(opt.key));
      this.optsFrame.appendChild(b);
    }
  }
  clearOptions(){
    this.optsFrame.innerHTML = '';
  }

  /* ===== flujo narrativo ===== */
  startIntro(){ this.introStep(0); }

  introStep(i){
    if(i >= INTRO_BLOCKS.length-1){
      this.typewrite([INTRO_BLOCKS[i]], ()=>this.showYes());
    } else {
      this.typewrite([INTRO_BLOCKS[i]], ()=>this.showContinue(()=>this.introStep(i+1)));
    }
  }

  showYes(){
    this.clearOptions();
    const pal = SKY_STAGES[0];
    const b = document.createElement('button');
    b.id='yesBtn';
    b.textContent='  [ Si ]  ';
    b.style.background = pal.btn_bg;
    b.style.color = pal.btn_fg;
    b.addEventListener('click', ()=>this.beginQuestions());
    this.optsFrame.appendChild(b);
  }

  beginQuestions(){
    this.clearOptions();
    this.advanceStage(()=>{
      setTimeout(()=>this.ask(0), 600);
    });
  }

  ask(qi){
    const q = QUESTIONS[qi];
    this.typewrite(q.text, ()=>this.showOptions(q.options, (k)=>this.handle(qi,k)));
  }

  handle(qi,key){
    this.clearOptions();
    const q = QUESTIONS[qi];
    this.memory[q.id] = key;
    this.advanceStage(()=>{
      this.typewrite(q.responses[key], ()=>this.afterResponse(qi));
    });
  }

  afterResponse(qi){
    if(qi < NARRATIVE_BETWEEN.length){
      this.showContinue(()=>this.narrative(qi, qi+1));
    } else if(qi+1 < QUESTIONS.length){
      this.showContinue(()=>this.ask(qi+1));
    } else {
      this.showContinue(()=>this.closing());
    }
  }

  narrative(ni, nextQi){
    this.advanceStage(()=>{
      this.typewrite(NARRATIVE_BETWEEN[ni], ()=>this.afterNarrative(nextQi));
    });
  }

  afterNarrative(nextQi){
    if(nextQi < QUESTIONS.length){
      this.showContinue(()=>this.ask(nextQi));
    } else {
      this.showContinue(()=>this.closing());
    }
  }

  closing(){
    this.stage = SKY_STAGES.length-1;
    this.stageFrac = 0.0;
    this.updateUiColors(SKY_STAGES[SKY_STAGES.length-1]);
    this.closingStep(0);
  }

  closingStep(i){
    if(i >= CLOSING_BLOCKS.length){
      this.final();
      return;
    }
    this.typewrite(CLOSING_BLOCKS[i], ()=>this.showContinue(()=>this.closingStep(i+1)));
  }

  final(){
    const nombreStr = this.nombre ? `, ${this.nombre}` : "";
    this.typewrite(
      ["Hoy es un día especial.", `Feliz cumpleaños${nombreStr}.`, "* * *"],
      ()=>this.showLandscapeButton()
    );
    setTimeout(()=>this.rainbowText(), 2000);
  }

  rainbowText(){
    if(this.landscapeMode) return;
    const cols=["#ffcc88","#ffaacc","#aaccff","#aaffcc","#ffeebb","#ccaaff"];
    let idx=0;
    const cycle=()=>{
      if(this.landscapeMode) return;
      this.panelText.style.color = cols[idx % cols.length];
      idx++;
      setTimeout(cycle, 600);
    };
    cycle();
  }

  showLandscapeButton(){
    this.clearOptions();
    const b = document.createElement('button');
    b.className='opt-btn';
    b.textContent='  Sentarse junto a la fogata  ';
    b.style.background='#0d1a2a';
    b.style.color='#7799cc';
    b.addEventListener('click', ()=>this.enterLandscape());
    this.optsFrame.appendChild(b);
  }

  enterLandscape(){
    this.landscapeMode = true;
    this.panel.style.display='none';
    this.landscapeTyping = true;
    this.landscapeShown = 0;
    this.landscapeChars = 0;
    setTimeout(()=>this.tickLandscapeMessage(), 2000);
  }
}

/* ════════════════════════════════════════════════════════════════
   BROMA INICIAL — ventanas de error falsas estilo Windows XP
   ════════════════════════════════════════════════════════════════ */
const SEQ_ERRORS = [
  ["Error crítico","Se ha producido un error crítico en la aplicación.\nCódigo: 0x0000142A"],
  ["Error fatal","La aplicación ha encontrado un error fatal y debe cerrarse.\nCódigo: 0xC0000005"],
  ["Software no responde","Luz.exe no responde.\nEsperando respuesta del sistema..."],
  ["Fallo inesperado","Se ha producido un fallo inesperado durante la inicialización.\nCódigo: 0x8007045D"],
  ["Error del sistema","El sistema ha detectado una operación no válida.\nCódigo: 0x0000007E"],
  ["Excepción no controlada","Se ha producido una excepción no controlada en el módulo principal.\nCódigo: 0xE06D7363"],
  ["Memoria insuficiente","No hay suficiente memoria para completar esta operación.\nCódigo: 0x8007000E"],
];
const SIMUL_EXTRA_ERRORS = [
  ["Error crítico","Conflicto entre múltiples instancias.\nCódigo: 0x00000050"],
  ["Fallo inesperado","El controlador no responde.\nCódigo: 0x0000009C"],
  ["Error del sistema","Desbordamiento de pila detectado.\nCódigo: 0xC00000FD"],
];
const SIMUL_ERROR_POOL = SEQ_ERRORS.concat(SIMUL_EXTRA_ERRORS);
const SIMUL_ERROR_COUNT = 9;

function createFakeErrorWindow(title, message, x, y, onClose, width=380, height=150){
  const win = document.createElement('div');
  win.className='fake-win';
  win.style.width = width+'px';

  if(x===undefined || y===undefined){
    const sw = window.innerWidth, sh = window.innerHeight;
    x = 10 + Math.random()*Math.max(1, sw-width-20);
    y = 10 + Math.random()*Math.max(1, sh-height-60);
  }
  win.style.left = x+'px';
  win.style.top = y+'px';

  const titlebar = document.createElement('div');
  titlebar.className='titlebar';
  const titleSpan = document.createElement('span');
  titleSpan.textContent = title;
  const xBtn = document.createElement('div');
  xBtn.className='x';
  xBtn.textContent='X';
  titlebar.appendChild(titleSpan);
  titlebar.appendChild(xBtn);
  win.appendChild(titlebar);

  const body = document.createElement('div');
  body.className='body';

  const iconWrap = document.createElement('div');
  iconWrap.className='icon';
  iconWrap.innerHTML = `<svg width="36" height="36"><circle cx="18" cy="18" r="16" fill="#cc0000" stroke="#660000" stroke-width="2"/><line x1="11" y1="11" x2="25" y2="25" stroke="white" stroke-width="4"/><line x1="25" y1="11" x2="11" y2="25" stroke="white" stroke-width="4"/></svg>`;

  const msg = document.createElement('div');
  msg.className='msg';
  msg.textContent = message;

  body.appendChild(iconWrap);
  body.appendChild(msg);
  win.appendChild(body);

  const btnRow = document.createElement('div');
  btnRow.className='btnrow';
  const okBtn = document.createElement('button');
  okBtn.textContent='Aceptar';
  btnRow.appendChild(okBtn);
  win.appendChild(btnRow);

  document.body.appendChild(win);

  const accept = ()=>{
    win.remove();
    if(onClose) onClose();
  };
  okBtn.addEventListener('click', accept);
  xBtn.addEventListener('click', accept);

  okBtn.focus();
  return win;
}

function runSequentialErrors(index, onAllDone){
  if(index >= SEQ_ERRORS.length){ onAllDone(); return; }
  const [title,msg] = SEQ_ERRORS[index];
  const sw = window.innerWidth, sh = window.innerHeight;
  const x = sw/2-190, y = sh/2-75;
  createFakeErrorWindow(title, msg, x, y, ()=>runSequentialErrors(index+1, onAllDone));
}

function runSimultaneousErrors(onAllDone){
  let remaining = SIMUL_ERROR_COUNT;
  const oneClosed = ()=>{
    remaining--;
    if(remaining<=0) onAllDone();
  };
  for(let i=0;i<SIMUL_ERROR_COUNT;i++){
    const [title,msg] = SIMUL_ERROR_POOL[Math.floor(Math.random()*SIMUL_ERROR_POOL.length)];
    createFakeErrorWindow(title, msg, undefined, undefined, oneClosed);
  }
}

function showFinalJoke(onFinish){
  const win = document.createElement('div');
  win.className='fake-win';
  win.style.width='430px';
  const sw=window.innerWidth, sh=window.innerHeight;
  win.style.left = (sw/2-215)+'px';
  win.style.top = (sh/2-87)+'px';

  const titlebar = document.createElement('div');
  titlebar.className='titlebar';
  titlebar.innerHTML = `<span>Aviso</span><div class="x">X</div>`;
  win.appendChild(titlebar);

  const body = document.createElement('div');
  body.className='body';
  const iconWrap = document.createElement('div');
  iconWrap.className='icon';
  iconWrap.innerHTML = `<svg width="36" height="36"><circle cx="18" cy="18" r="16" fill="#2a9d2a" stroke="#155515" stroke-width="2"/><text x="18" y="24" font-size="18" font-weight="bold" fill="white" text-anchor="middle" font-family="Tahoma">!</text></svg>`;
  const msg = document.createElement('div');
  msg.className='msg';
  msg.textContent = "Está bien, ya no te quito la paciencia. \nEra bromita.\nAhora sí, disfrutemos la aplicación.";
  body.appendChild(iconWrap);
  body.appendChild(msg);
  win.appendChild(body);

  const btnRow = document.createElement('div');
  btnRow.className='btnrow';
  const okBtn = document.createElement('button');
  okBtn.textContent='Aceptar';
  btnRow.appendChild(okBtn);
  win.appendChild(btnRow);

  document.body.appendChild(win);

  const finish = ()=>{ win.remove(); onFinish(); };
  okBtn.addEventListener('click', finish);
  win.querySelector('.x').addEventListener('click', finish);
}

function startPrankSequence(onFinish){
  const afterSequential = ()=>{ runSimultaneousErrors(afterSimultaneous); };
  const afterSimultaneous = ()=>{ showFinalJoke(onFinish); };
  runSequentialErrors(0, afterSequential);
}

/* ════════════════════════════════════════════════════════════════
   PANTALLA DE NOMBRE Y ARRANQUE
   ════════════════════════════════════════════════════════════════ */
function showNameScreen(){
  document.getElementById('nameScreen').style.display = 'flex';
  document.getElementById('nameInput').focus();
}

function startRealApp(){
  showNameScreen();
}

document.getElementById('goBtn').addEventListener('click', goToApp);
document.getElementById('nameInput').addEventListener('keydown', (e)=>{
  if(e.key==='Enter') goToApp();
});

function goToApp(){
  const nombre = document.getElementById('nameInput').value.trim();
  document.getElementById('nameScreen').style.display='none';
  document.getElementById('app').style.display='block';
  window._luzApp = new LuzApp(nombre);
}

/* ---- Controles de musica ---- */
const bgMusic = document.getElementById('bgMusic');
bgMusic.volume = 1.0;

// Lista de nombres de archivo que se intentaran cargar automaticamente.
const MUSIC_CANDIDATES = [
  "musica_luz.mp3",
  "musica_luz.ogg",
  "musica_luz.wav",
  "musica_luz (1).mp3",
  "musica_luz (1).mpeg",
  "musica_luz (1).mp4",
];

let musicCheckIndex = 0;
let musicFoundSrc = null;

function showMusicNotice(text, isError){
  const notice = document.createElement('div');
  notice.textContent = text;
  notice.style.position='fixed';
  notice.style.left='50%';
  notice.style.bottom='50px';
  notice.style.transform='translateX(-50%)';
  notice.style.background = isError ? '#1a0a0a' : '#0a1a0a';
  notice.style.color = isError ? '#ffaaaa' : '#aaffaa';
  notice.style.padding='8px 16px';
  notice.style.fontFamily="'Courier New', monospace";
  notice.style.fontSize='12px';
  notice.style.border = isError ? '1px solid #663333' : '1px solid #336633';
  notice.style.zIndex='9999';
  notice.style.maxWidth='600px';
  notice.style.textAlign='center';
  document.body.appendChild(notice);
  setTimeout(()=>notice.remove(), 4500);
}

function tryNextMusicCandidate(){
  if(musicCheckIndex >= MUSIC_CANDIDATES.length){
    showMusicNotice(
      "No se encontró el archivo de música. Verifica que 'musica_luz.mp3' esté en la MISMA carpeta que index.html, y que abras index.html con un servidor local (no haciendo doble clic).",
      true
    );
    return;
  }
  const candidate = MUSIC_CANDIDATES[musicCheckIndex];
  musicCheckIndex++;
  bgMusic.removeAttribute('src');
  bgMusic.src = candidate;
  bgMusic.load();
}

bgMusic.addEventListener('error', ()=>{
  if(!musicFoundSrc) tryNextMusicCandidate();
});
bgMusic.addEventListener('canplaythrough', ()=>{
  musicFoundSrc = bgMusic.currentSrc;
}, {once:true});
bgMusic.addEventListener('loadedmetadata', ()=>{
  musicFoundSrc = bgMusic.currentSrc;
});

tryNextMusicCandidate();

document.getElementById('btnPlay').addEventListener('click', ()=>{
  if(!bgMusic.src){
    showMusicNotice("No hay ningún archivo de audio cargado todavía.", true);
    return;
  }
  const playPromise = bgMusic.play();
  if(playPromise !== undefined){
    playPromise.then(()=>{
      if(bgMusic.duration === 0 || isNaN(bgMusic.duration)){
        showMusicNotice("El archivo cargó pero parece estar vacío o corrupto (duración 0).", true);
      }
    }).catch((err)=>{
      showMusicNotice("Error al reproducir (" + err.name + "): " + err.message +
        ". Si abriste el HTML con doble clic, intenta usar un servidor local en su lugar.", true);
    });
  }
});
document.getElementById('btnPause').addEventListener('click', ()=>{ bgMusic.pause(); });
document.getElementById('btnStop').addEventListener('click', ()=>{ bgMusic.pause(); bgMusic.currentTime=0; });

/* ---- Arranque: broma de errores falsos, luego pantalla de nombre ---- */
window.addEventListener('load', ()=>{
  startPrankSequence(startRealApp);
});
